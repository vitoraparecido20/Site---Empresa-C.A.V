<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funcionários</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(120deg, #0a1f44, #1e3c72);
    color: #333;
}

/* HEADER */
.header {
    background: #fff;
    padding: 15px;
    font-weight: bold;
}

/* CONTAINER */
.container {
    padding: 20px;
}

/* TOPO */
.topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.topo h2 {
    color: white;
}

.btn {
    border: none;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
}

.btn-csv {
    background: #ddd;
}

.btn-add {
    background: #2d6cdf;
    color: white;
}

/* CARD TABELA */
.card {
    margin-top: 20px;
    background: white;
    padding: 20px;
    border-radius: 15px;
}

table {
    width: 100%;
}

th {
    text-align: left;
    color: gray;
}

td {
    padding-top: 10px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #fff;
    padding: 20px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
}

.modal h3 {
    margin-top: 0;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.row {
    display: flex;
    gap: 10px;
}

.row input {
    flex: 1;
}

.total-box {
    background: #eee;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
}

.btn-salvar {
    width: 100%;
    background: #2d6cdf;
    color: white;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.close {
    float: right;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">Sistema de Gestão Empresarial</div>

<div class="container">

    <div class="topo">
        <h2>👥 Funcionários</h2>
        <div>
            <button class="btn btn-csv">CSV</button>
            <button class="btn btn-add" onclick="abrirModal()">+ Cadastrar</button>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>RG</th>
                </tr>
            </thead>
            <tbody id="tabela"></tbody>
        </table>
    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="fecharModal()">✖</span>
        <h3>+ Novo Funcionário</h3>

        <input type="text" id="nome" placeholder="Nome completo">

        <div class="row">
            <input type="text" id="cpf" placeholder="CPF">
            <input type="text" id="rg" placeholder="RG">
        </div>

        <div class="row">
            <input type="number" id="valor" placeholder="Valor Hora">
            <input type="number" id="horas" placeholder="Horas">
            <div class="total-box" id="total">R$ 0,00</div>
        </div>

        <input type="text" placeholder="PIX">
        <input type="text" placeholder="Telefone">
        <textarea placeholder="Observações"></textarea>

        <button class="btn-salvar" onclick="salvar()">💾 Salvar</button>
    </div>
</div>

<script>
let funcionarios = [];

function abrirModal() {
    document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
}

/* CALCULAR TOTAL */
document.getElementById("valor").addEventListener("input", calcular);
document.getElementById("horas").addEventListener("input", calcular);

function calcular() {
    let valor = parseFloat(document.getElementById("valor").value) || 0;
    let horas = parseFloat(document.getElementById("horas").value) || 0;
    let total = valor * horas;

    document.getElementById("total").innerText =
        "R$ " + total.toFixed(2).replace(".", ",");
}

/* SALVAR FUNCIONÁRIO */
function salvar() {
    let nome = document.getElementById("nome").value;
    let cpf = document.getElementById("cpf").value;
    let rg = document.getElementById("rg").value;

    if (!nome) {
        alert("Digite o nome");
        return;
    }

    funcionarios.push({ nome, cpf, rg });

    atualizarTabela();
    fecharModal();
    limpar();
}

/* ATUALIZAR TABELA */
function atualizarTabela() {
    let tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    funcionarios.forEach(f => {
        tabela.innerHTML += `
            <tr>
                <td>${f.nome}</td>
                <td>${f.cpf}</td>
                <td>${f.rg}</td>
            </tr>
        `;
    });
}

/* LIMPAR CAMPOS */
function limpar() {
    document.getElementById("nome").value = "";
    document.getElementById("cpf").value = "";
    document.getElementById("rg").value = "";
    document.getElementById("valor").value = "";
    document.getElementById("horas").value = "";
    document.getElementById("total").innerText = "R$ 0,00";
}
</script>

</body>
</html>
