<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Recebíveis</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #fff;
    margin: 0;
}

/* HEADER */
.header {
    background: #1e293b;
    padding: 15px;
    font-size: 18px;
}

/* CONTAINER */
.container {
    padding: 20px;
}

/* BOTÃO */
.btn {
    background: #2563eb;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
}

/* TABELA */
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
    background: white;
    color: black;
    border-radius: 10px;
    overflow: hidden;
}

th, td {
    padding: 12px;
    text-align: left;
}

th {
    background: #f1f5f9;
}

.status {
    padding: 5px 10px;
    border-radius: 10px;
    font-size: 12px;
}

.pendente {
    background: #e2e8f0;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
}

.modal-content input {
    width: 100%;
    margin-bottom: 10px;
    padding: 8px;
}
</style>
</head>

<body>

<div class="header">
    Sistema de Gestão Empresarial
</div>

<div class="container">
    <h2>💰 Recebíveis</h2>

    <button class="btn" onclick="abrirModal()">+ Registrar</button>

    <table id="tabela">
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Descrição</th>
                <th>Valor</th>
                <th>Emissão</th>
                <th>Vencimento</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Novo Recebível</h3>

        <input type="text" id="cliente" placeholder="Cliente">
        <input type="text" id="descricao" placeholder="Descrição">
        <input type="number" id="valor" placeholder="Valor">
        <input type="date" id="emissao">
        <input type="date" id="vencimento">

        <button class="btn" onclick="registrar()">Registrar</button>
        <button onclick="fecharModal()">Cancelar</button>
    </div>
</div>

<script>
function abrirModal() {
    document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
}

function registrar() {
    let cliente = document.getElementById("cliente").value;
    let descricao = document.getElementById("descricao").value;
    let valor = document.getElementById("valor").value;
    let emissao = document.getElementById("emissao").value;
    let vencimento = document.getElementById("vencimento").value;

    if(cliente === "" || valor === "") {
        alert("Preencha os campos obrigatórios!");
        return;
    }

    let tabela = document.querySelector("#tabela tbody");

    let linha = `
        <tr>
            <td>${cliente}</td>
            <td>${descricao}</td>
            <td>R$ ${parseFloat(valor).toFixed(2)}</td>
            <td>${emissao}</td>
            <td>${vencimento}</td>
            <td><span class="status pendente">Pendente</span></td>
        </tr>
    `;

    tabela.innerHTML += linha;

    fecharModal();
}
</script>

</body>
</html>
