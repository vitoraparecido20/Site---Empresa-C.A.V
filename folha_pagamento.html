<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folha de Pagamento</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    margin: 0;
}

.container {
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

.topo {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 15px;
}

select, button {
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    cursor: pointer;
    background: #2563eb;
    color: #fff;
}

.status {
    color: #22c55e;
    margin-bottom: 20px;
}

.tabela {
    background: #fff;
    color: #000;
    border-radius: 12px;
    padding: 15px;
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: left;
}

th {
    color: #555;
}

.card-container {
    display: flex;
    gap: 15px;
    margin-top: 20px;
}

.card {
    flex: 1;
    background: #fff;
    color: #000;
    padding: 20px;
    border-radius: 12px;
}

.valor {
    font-size: 22px;
    font-weight: bold;
}

.valor.amarelo {
    color: #f59e0b;
}

.valor.verde {
    color: #22c55e;
}
</style>
</head>

<body>

<div class="container">
    <h1>Folha de Pagamento</h1>

    <div class="topo">
        <label>Mês:</label>
        <select id="mes">
            <option value="3">Março</option>
        </select>

        <label>Ano:</label>
        <select id="ano">
            <option value="2026">2026</option>
        </select>

        <button onclick="exportarCSV()">⬇ CSV</button>
    </div>

    <div class="status">
        ✔ Folha de Março/2026 já processada!
    </div>

    <div class="tabela">
        <table id="tabela">
            <thead>
                <tr>
                    <th>Funcionário</th>
                    <th>Salário Bruto</th>
                    <th>Vales a Descontar</th>
                    <th>Salário Líquido</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
            </tbody>
        </table>
    </div>

    <div class="card-container">
        <div class="card">
            <div>Total Bruto</div>
            <div class="valor" id="totalBruto">R$ 0,00</div>
        </div>

        <div class="card">
            <div>Total Vales</div>
            <div class="valor amarelo" id="totalVales">R$ 0,00</div>
        </div>

        <div class="card">
            <div>Total Líquido</div>
            <div class="valor verde" id="totalLiquido">R$ 0,00</div>
        </div>
    </div>
</div>

<script>
// Dados simulados
const funcionarios = [
    {
        nome: "Vania de Araujo",
        salario: 720,
        vales: 500
    }
];

function formatar(valor) {
    return valor.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
    });
}

function carregarTabela() {
    const corpo = document.getElementById("corpoTabela");
    corpo.innerHTML = "";

    let totalBruto = 0;
    let totalVales = 0;
    let totalLiquido = 0;

    funcionarios.forEach(f => {
        const liquido = f.salario - f.vales;

        totalBruto += f.salario;
        totalVales += f.vales;
        totalLiquido += liquido;

        const linha = `
            <tr>
                <td>${f.nome}</td>
                <td>${formatar(f.salario)}</td>
                <td>${formatar(f.vales)}</td>
                <td><strong>${formatar(liquido)}</strong></td>
            </tr>
        `;

        corpo.innerHTML += linha;
    });

    document.getElementById("totalBruto").innerText = formatar(totalBruto);
    document.getElementById("totalVales").innerText = formatar(totalVales);
    document.getElementById("totalLiquido").innerText = formatar(totalLiquido);
}

// Exportar CSV
function exportarCSV() {
    let csv = "Funcionario,Salario Bruto,Vales,Salario Liquido\n";

    funcionarios.forEach(f => {
        let liquido = f.salario - f.vales;
        csv += ${f.nome},${f.salario},${f.vales},${liquido}\n;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "folha_pagamento.csv";
    link.click();
}

carregarTabela();
</script>

</body>
</html>
