<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAV Studios - Acesso</title>
  <style>
    /* --- RESET E VARIÁVEIS --- */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
    body { background-color: #0d0d0d; color: #eaeaea; overflow-x: hidden; }

    /* --- TELA DE LOGIN (ESTILO DA IMAGEM) --- */
    #login-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle, #0a3d62 0%, #001219 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    .login-box {
      display: flex;
      width: 800px;
      height: 450px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid #00f2ff;
      box-shadow: 0 0 25px rgba(0, 242, 255, 0.3);
      border-radius: 8px;
      overflow: hidden;
    }

    .login-form { flex: 1; padding: 50px; color: white; }
    .login-form h2 { margin-bottom: 30px; font-size: 2rem; text-align: center; }

    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-size: 0.7rem; color: #00f2ff; margin-bottom: 5px; font-weight: bold; letter-spacing: 1px; }
    .input-group input { 
        width: 100%; background: transparent; border: none; 
        border-bottom: 1px solid rgba(255, 255, 255, 0.3); 
        padding: 10px; color: white; outline: none; 
    }

    .btn-entrar {
      width: 100%; padding: 12px; border-radius: 25px; border: none;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: white; font-weight: bold; cursor: pointer; margin-top: 20px;
      transition: transform 0.2s;
    }
    .btn-entrar:hover { transform: scale(1.02); }

    .welcome-side {
      flex: 1; background: #00f2ff; color: #001219;
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; text-align: center; padding: 40px;
      clip-path: polygon(20% 0%, 100% 0%, 100% 100%, 0% 100%);
      margin-left: -80px;
    }

    /* --- CONTEÚDO DO SITE (ESCONDIDO INICIALMENTE) --- */
    #main-content { display: none; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 30px; background-color: #111; border-bottom: 1px solid #222;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo svg { width: 40px; height: 40px; fill: #00f2ff; }

    nav { display: flex; list-style: none; gap: 20px; }
    nav a { color: #ccc; text-decoration: none; font-size: 14px; transition: 0.3s; }
    nav a:hover { color: #00f2ff; }

    .container { padding: 40px; max-width: 1000px; margin: 0 auto; }
    h1 { margin-bottom: 20px; color: #00f2ff; }

    input, textarea {
      width: 100%; padding: 12px; margin: 10px 0;
      background: #1a1a1a; border: 1px solid #333; color: white;
    }

    .submit-btn {
      background-color: #0072ff; border: none; padding: 10px 25px;
      color: white; cursor: pointer; border-radius: 4px;
    }
  </style>
</head>
<body>

  <div id="login-overlay">
    <div class="login-box">
      <div class="login-form">
        <h2>Login</h2>
        <div class="input-group">
          <label>NOME / EMAIL</label>
          <input type="text" id="user" placeholder="Digite seu usuário">
        </div>
        <div class="input-group">
          <label>SENHA</label>
          <input type="password" id="pass" placeholder="••••••••">
        </div>
        <button class="btn-entrar" onclick="tentarLogin()">Entrar</button>
        <p style="font-size: 12px; text-align: center; margin-top: 15px; opacity: 0.7;">
            Não tem conta? <a href="#" style="color: #00f2ff; text-decoration: none;">inscrever-se</a>
        </p>
      </div>
      <div class="welcome-side">
        <h1 style="color: #001219;">BEM-VINDO</h1>
        <p style="font-weight: 500;">Acesse o painel exclusivo da CAV Studios.</p>
      </div>
    </div>
  </div>

  <div id="main-content">
    <header>
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7zm0 9a2 2 0 110-4 2 2 0 010 4z"/></svg>
        <h2>CAV Studios</h2>
      </div>
      <nav>
        <li><a href="trabalhe_conosco.html">Trabalhe Conosco</a></li>
        <li><a href="sobre_nos.html">Sobre nós</a></li>
        <li><a href="controle_financeiro.html">Controle Financeiro</a></li>
        <li><a href="#" onclick="logout()">Sair</a></li>
      </nav>
    </header>

    <div class="container">
      <div id="home">
        <h1>Bem-vindo à CAV Studios</h1>
        <p>Produzimos experiências cinematográficas e eventos imersivos de alto nível.</p>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #333;">
      </div>
    </div>
  </div>

  <script>
    function tentarLogin() {
      const user = document.getElementById('user').value;
      const pass = document.getElementById('pass').value;

      // Validação simples (pode alterar para o que quiser)
      if(user !== "" && pass !== "") {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
      } else {
        alert("Por favor, preencha todos os campos.");
      }
    }

    function logout() {
        location.reload(); // Recarrega a página para voltar ao login
    }
  </script>

</body>
</html>
