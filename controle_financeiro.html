        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { display: flex; min-height: 100vh; background-color: var(--main-bg); color: white; overflow: hidden; }
        /* SIDEBAR */
        .sidebar { width: 260px; background-color: var(--sidebar-bg); display: flex; flex-direction: column; border-right: 1px solid #1e293b; z-index: 10; }

        .sidebar ul { list-style: none; }
        .sidebar li { padding: 12px 20px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; gap: 12px; transition: 0.2s; font-size: 0.9rem; }
        .sidebar li:hover { background: #1e293b; color: white; }
        .sidebar li.active { background: #1e293b; color: white; border-left: 4px solid var(--accent-blue); }
        .sidebar i { width: 20px; text-align: center; }

        /* MAIN CONTENT AREA */
        .main-wrapper { flex: 1; position: relative; display: flex; flex-direction: column; overflow-y: auto; }

        /* BACKGROUND IMAGE WITH OVERLAY */
        .bg-overlay {
            position: fixed; top: 0; left: 260px; right: 0; bottom: 0;
            background-image: url('https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center; z-index: 1;
        }
        .bg-darken { position: fixed; top: 0; left: 260px; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.85); z-index: 2; }

        .content-container { position: relative; z-index: 3; padding: 30px; max-width: 1200px; width: 100%; margin: 0 auto; }

        /* DASHBOARD CARDS */
        .top-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; font-size: 0.9rem; }
        .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); color: #1e293b; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; }
        .card .label { color: #64748b; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; font-weight: 600; }
        .card .value { font-size: 1.75rem; font-weight: 700; }

        /* TABLES */
        .section-title { font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: #fbbf24; }
        .table-wrapper { background: var(--card-bg); border-radius: 12px; overflow: hidden; color: #1e293b; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 12px 15px; text-align: left; font-size: 0.75rem; color: #64748b; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }

        .btn-action { background: var(--accent-blue); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
        .hidden { display: none; }

    <script>
        function navigate(pageId, element) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');

            document.querySelectorAll('#main-menu li').forEach(li => li.classList.remove('active'));
            element.classList.add('active');
        }
