<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Clientes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    margin: 0;
    color: #333;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    color: white;
}

.header h2 {
    margin: 0;
}

.btn {
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}

.btn-primary {
    background: #2563eb;
    color: white;
}

.btn-secondary {
    background: #e5e7eb;
}

/* TABELA */
.container {
    background: #e5e7eb;
    margin: 20px;
    border-radius: 12px;
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    text-align: left;
    padding: 10px;
}

td {
    padding: 10px;
    border-top: 1px solid #ccc;
}

.actions button {
    margin-right: 5px;
    cursor: pointer;
}

/* MODAL */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 400px;
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.row {
    display: flex;
    gap: 10px;
}

</style>
</head>

<body>

<div class="header">
    <h2>📋 Clientes</h2>
    <div>
        <button class="btn btn-secondary" onclick="exportCSV()">CSV</button>
        <button class="btn btn-primary" onclick="abrirModal()">+ Cadastrar</button>
    </div>
</div>

<div class="container">
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>CNPJ/CPF</th>
                <th>Endereço</th>
                <th>Telefone</th>
                <th>E-mail</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabelaClientes"></tbody>
    </table>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Novo Cliente</h3>
            <button onclick="fecharModal()">✖</button>
        </div>

        <input id="nome" placeholder="Nome / Razão Social">
        <input id="cpf" placeholder="CNPJ/CPF">
        <input id="endereco" placeholder="Endereço">

        <div class="row">
            <input id="telefone" placeholder="Telefone">
            <input id="email" placeholder="E-mail">
        </div>

        <button class="btn btn-primary" style="width:100%" onclick="salvarCliente()">💾 Salvar</button>
    </div>
</div>

<script>
let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
let editIndex = null;

function abrirModal() {
    document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
    limparCampos();
}

function limparCampos() {
    document.getElementById("nome").value = "";
    document.getElementById("cpf").value = "";
    document.getElementById("endereco").value = "";
    document.getElementById("telefone").value = "";
    document.getElementById("email").value = "";
    editIndex = null;
}

function salvarCliente() {
    let cliente = {
        nome: document.getElementById("nome").value,
        cpf: document.getElementById("cpf").value,
        endereco: document.getElementById("endereco").value,
        telefone: document.getElementById("telefone").value,
        email: document.getElementById("email").value
    };

    if (!cliente.nome) {
        alert("Preencha o nome!");
        return;
    }

    if (editIndex !== null) {
        clientes[editIndex] = cliente;
    } else {
        clientes.push(cliente);
    }

    localStorage.setItem("clientes", JSON.stringify(clientes));
    renderTabela();
    fecharModal();
}

function renderTabela() {
    let tabela = document.getElementById("tabelaClientes");
    tabela.innerHTML = "";

    clientes.forEach((c, index) => {
        tabela.innerHTML += `
        <tr>
            <td>${c.nome}</td>
            <td>${c.cpf}</td>
            <td>${c.endereco}</td>
            <td>${c.telefone}</td>
            <td>${c.email}</td>
            <td class="actions">
                <button onclick="editarCliente(${index})">✏️</button>
                <button onclick="excluirCliente(${index})">🗑️</button>
            </td>
        </tr>
        `;
    });
}

function editarCliente(index) {
    let c = clientes[index];

    document.getElementById("nome").value = c.nome;
    document.getElementById("cpf").value = c.cpf;
    document.getElementById("endereco").value = c.endereco;
    document.getElementById("telefone").value = c.telefone;
    document.getElementById("email").value = c.email;

    editIndex = index;
    abrirModal();
}

function excluirCliente(index) {
    if (confirm("Deseja excluir?")) {
        clientes.splice(index, 1);
        localStorage.setItem("clientes", JSON.stringify(clientes));
        renderTabela();
    }
}

function exportCSV() {
    let csv = "Nome,CNPJ/CPF,Endereço,Telefone,E-mail\n";

    clientes.forEach(c => {
        csv += `${c.nome},${c.cpf},${c.endereco},${c.telefone},${c.email}\n`;
    });

    let blob = new Blob([csv], { type: 'text/csv' });
    let url = window.URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "clientes.csv";
    a.click();
}

renderTabela();
</script>

</body>
</html>
